spring:
  application:
    name: APIRestaurant

  datasource:
    url: jdbc:postgresql://localhost:5432/Restaurant
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
